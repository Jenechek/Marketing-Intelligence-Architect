<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Отключить интеграцию?</title><link rel="stylesheet" href="{{ url_for('static',path='/styles.css') }}"></head><body><main class="page-shell narrow-shell"><section class="content-card danger-confirmation"><h1>Отключить интеграцию?</h1><p>Локальные токены будут удалены, расписание выключено, ожидающие запуски отменены. Показатели, журнал и история ресурсов сохранятся.</p><p>Это не отзывает разрешение в кабинете Google или Яндекса.</p><form method="post"><input type="hidden" name="action_token" value="{{ action_token }}"><input type="hidden" name="connection_revision" value="{{ connection_revision }}"><button class="danger-action">Да, отключить</button><a class="secondary-action" href="/own-sites/{{ site_id }}/integrations">Отмена</a></form></section></main></body></html>

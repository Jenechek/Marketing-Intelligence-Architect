<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Удаление временно недоступно — Marketing Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <main class="page-shell narrow-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">Удаление сайта</p>
                <h1>Дождитесь завершения обхода</h1>
                <p class="lead">Сайт «{{ site.name }}» не удалён.</p>
            </div>
        </header>

        <section class="content-card" aria-labelledby="delete-running-title">
            <div class="notice error" role="alert">
                Пока полный обход выполняется, сайт и связанные данные нельзя удалить. Дождитесь завершения запуска и откройте удаление ещё раз.
            </div>
            <h2 id="delete-running-title">Активный запуск</h2>
            <a class="primary-action" href="/crawl-runs/{{ run_id }}">Показать ход обхода</a>
            <a class="secondary-action" href="/sites/{{ site.id }}/edit">Вернуться к сайту</a>
        </section>
    </main>
</body>
</html>

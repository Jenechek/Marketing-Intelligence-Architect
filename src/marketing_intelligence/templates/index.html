<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marketing Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="status-card" aria-labelledby="page-title">
            <p class="eyebrow">Локальное приложение</p>
            <h1 id="page-title">Marketing Intelligence запущен</h1>
            <p class="lead">Минимальная рабочая основа подготовлена и отвечает на запросы.</p>

            <div class="status" role="status" aria-label="Текущее состояние приложения">
                <span class="status-mark" aria-hidden="true">✓</span>
                <div>
                    <span class="status-label">Статус</span>
                    <strong>{{ status }}</strong>
                </div>
            </div>

            <div class="next-step">
                <h2>Следующий шаг</h2>
                <p>{{ next_step }}</p>
            </div>

            <p class="scope-note">Управление сайтами появится на следующем этапе и сейчас недоступно.</p>
        </section>
    </main>
</body>
</html>

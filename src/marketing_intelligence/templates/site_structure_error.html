<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} — {{ site.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
<main class="page-shell narrow-shell">
    <header class="page-header"><div><p class="eyebrow">Карта структуры</p><h1>{{ title }}</h1><p class="lead">{{ site.name }}</p></div></header>
    <section class="content-card"><div class="notice error" role="alert">{{ message }}</div><a class="secondary-action" href="{{ return_url }}">Вернуться</a></section>
</main>
</body>
</html>

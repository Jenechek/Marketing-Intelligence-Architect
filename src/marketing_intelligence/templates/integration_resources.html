<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Выбор ресурса</title><link rel="stylesheet" href="{{ url_for('static',path='/styles.css') }}"></head><body><main class="page-shell"><section class="content-card"><h1>Изменить ресурс</h1>{% if error %}<div class="notice error" role="alert">{{ error }}</div>{% elif resources %}<form method="post"><input type="hidden" name="action_token" value="{{ action_token }}"><input type="hidden" name="source_id" value="{{ source_id }}"><label for="resource_id">Подтверждённый ресурс текущего аккаунта</label><select id="resource_id" name="resource_id" required>{% for resource in resources %}<option value="{{ resource.id }}">{{ resource.label }}</option>{% endfor %}</select><button class="primary-action">Сохранить и синхронизировать</button></form>{% else %}<div class="empty-state"><h2>Подходящих ресурсов нет</h2><p>В текущем аккаунте не найден подтверждённый ресурс этого домена.</p></div>{% endif %}<a class="secondary-action" href="/own-sites/{{ site_id }}/integrations">Назад</a></section></main></body></html>

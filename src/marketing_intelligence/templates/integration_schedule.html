<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Расписание интеграции</title><link rel="stylesheet" href="{{ url_for('static',path='/styles.css') }}"></head><body><main class="page-shell narrow-shell"><section class="content-card"><h1>Расписание синхронизации</h1><form method="post"><input type="hidden" name="action_token" value="{{ action_token }}"><input type="hidden" name="connection_revision" value="{{ connection_revision }}"><label><input type="checkbox" name="enabled" value="1" {% if schedule.enabled %}checked{% endif %}> Включить автоматическую синхронизацию</label><label for="frequency">Частота</label><select id="frequency" name="frequency"><option value="daily" {% if schedule.frequency=='daily' %}selected{% endif %}>Ежедневно</option><option value="weekly" {% if schedule.frequency=='weekly' %}selected{% endif %}>Еженедельно</option></select><label for="local_weekday">День недели (0 — понедельник)</label><input id="local_weekday" name="local_weekday" type="number" min="0" max="6" value="{{ schedule.local_weekday }}"><label for="local_time">Локальное время</label><input id="local_time" name="local_time" type="time" value="{{ schedule.local_time }}" required><button class="primary-action">Сохранить расписание</button></form><a class="secondary-action" href="/own-sites/{{ site_id }}/integrations">Назад</a></section></main></body></html>
